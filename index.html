<!doctype html>
<html lang="en">
  <head>
    <!-- Basic Setup -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Title -->
    <title>
      Toyable | The Ultimate Vintage Toy Database & Collector Community
    </title>

    <!-- SEO Meta Description -->
    <meta
      name="description"
      content="Toyable is the ultimate vintage toy database built by collectors. Track your collection, explore the Toyable 200, access market valuations, and connect with the community."
    />

    <!-- Keywords (Optional but helpful) -->
    <meta
      name="keywords"
      content="vintage toys, toy database, toy collection tracker, toyable 200, vintage toy values, collectors community"
    />

    <!-- Author -->
    <meta name="author" content="Toyable" />

    <!-- Open Graph (Facebook, LinkedIn etc.) -->
    <meta property="og:title" content="Toyable | The Ultimate Vintage Toy Database" />
    <meta
      property="og:description"
      content="Track, showcase and analyse your vintage toy collection with Toyable."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://toyable.app" />
    <meta property="og:image" content="/og.jpg" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Toyable | Vintage Toy Database" />
    <meta
      name="twitter:description"
      content="The ultimate collector-driven vintage toy platform."
    />
    <meta name="twitter:image" content="/og.jpg" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- Theme Color (Mobile Browser Bar Color) -->
    <meta name="theme-color" content="#F97316" />

    <!-- Tailwind CSS -->
    <link href="/src/index.css" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
